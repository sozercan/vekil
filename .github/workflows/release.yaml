name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos-app:
    runs-on: macos-26
    needs: release
    outputs:
      app_sha256: ${{ steps.sha256.outputs.value }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Require Sparkle keys
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          if [ -z "$SPARKLE_PUBLIC_ED_KEY" ] || [ -z "$SPARKLE_PRIVATE_ED_KEY" ]; then
            echo "SPARKLE_PUBLIC_ED_KEY and SPARKLE_PRIVATE_ED_KEY are required to publish Sparkle updates" >&2
            exit 1
          fi

      - name: Build macOS menubar app
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: VERSION=${GITHUB_REF#refs/tags/} GOARCH=arm64 make build-app

      - name: Archive app bundle
        run: |
          mkdir -p dist/macos-release
          ditto -c -k --sequesterRsrc --keepParent "Vekil.app" dist/macos-release/"vekil-macos-arm64.zip"

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          printf '%s' "$SPARKLE_PRIVATE_ED_KEY" | .build/sparkle/unpacked/bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            --full-release-notes-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}" \
            --maximum-deltas 0 \
            dist/macos-release

      - name: Upload macOS updater assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" dist/macos-release/vekil-macos-arm64.zip dist/macos-release/appcast.xml --clobber

      - name: Calculate macOS app SHA256
        id: sha256
        run: echo "value=$(shasum -a 256 dist/macos-release/vekil-macos-arm64.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

  publish:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest

  finalize-release:
    runs-on: ubuntu-latest
    needs: [macos-app, publish]
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF#refs/tags/}" --draft=false --repo "${GITHUB_REPOSITORY}"

  homebrew-cask:
    runs-on: ubuntu-latest
    needs: [macos-app, finalize-release]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Require tap publishing token
        env:
          HOMEBREW_REPO_TOKEN: ${{ secrets.HOMEBREW_REPO_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_REPO_TOKEN" ]; then
            echo "HOMEBREW_REPO_TOKEN is required to publish the Homebrew cask" >&2
            exit 1
          fi

      - name: Checkout Homebrew tap repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: sozercan/homebrew-repo
          token: ${{ secrets.HOMEBREW_REPO_TOKEN }}
          path: homebrew-repo

      - name: Update Homebrew cask
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ./scripts/publish-homebrew-cask.sh "$VERSION" "${{ needs.macos-app.outputs.app_sha256 }}" homebrew-repo

      - name: Commit and push Homebrew cask
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          git -C homebrew-repo config user.name "github-actions[bot]"
          git -C homebrew-repo config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C homebrew-repo add Casks/vekil.rb
          git -C homebrew-repo diff --cached --quiet || git -C homebrew-repo commit -m "Update vekil to ${TAG}"
          git -C homebrew-repo push origin main
