name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              OUTPUT="vekil-${GOOS}-${GOARCH}"
              echo "Building ${OUTPUT}..."
              CGO_ENABLED=0 GOOS=${GOOS} GOARCH=${GOARCH} go build -ldflags="-s -w" -o ${OUTPUT} .
            done
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: vekil-*

  macos-app:
    runs-on: macos-26
    needs: release
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build macOS menubar app
        run: VERSION=${GITHUB_REF#refs/tags/} GOARCH=arm64 make build-app

      - name: Zip app bundle
        run: zip -r "vekil-macos-arm64.zip" "Vekil.app"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: "vekil-macos-arm64.zip"

  publish:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
