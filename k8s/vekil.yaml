apiVersion: apps/v1
kind: Deployment
metadata:
  name: vekil
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vekil
  template:
    metadata:
      labels:
        app: vekil
    spec:
      containers:
        - name: vekil
          image: ghcr.io/sozercan/vekil:20260310-190750
          imagePullPolicy: Always
          ports:
            - containerPort: 1337
          env:
            - name: PORT
              value: "1337"
            - name: TOKEN_DIR
              value: /home/nonroot/.config/vekil
          volumeMounts:
            - name: token-cache
              mountPath: /home/nonroot/.config/vekil
      volumes:
        - name: token-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vekil
spec:
  selector:
    app: vekil
  ports:
    - port: 1337
      targetPort: 1337
